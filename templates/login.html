{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-card">

    <!-- Brand header -->
    <div class="auth-header">
        <div class="auth-logo">⬡</div>
        <h1 class="auth-title">SecureShare</h1>
        <p class="auth-subtitle">Sign in to your account</p>
    </div>

    <!-- Login form -->
    <form action="{{ url_for('login') }}" method="POST" class="auth-form">

        <div class="form-group">
            <label for="email" class="form-label">Email address</label>
            <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="you@example.com"
                required
                autofocus
            >
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="••••••••"
                required
            >
        </div>

        <div class="form-check">
            <input type="checkbox" id="remember" name="remember" class="check-input">
            <label for="remember" class="check-label">Remember me</label>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Sign In</button>

    </form>

    <!-- Register link -->
    <div class="auth-footer">
        <p>Don't have an account? <a href="{{ url_for('register') }}" class="link">Create one</a></p>
    </div>

</div>
{% endblock %}
