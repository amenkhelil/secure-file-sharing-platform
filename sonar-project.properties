# =============================================================================
# sonar-project.properties
# SonarCloud configuration for Secure File Sharing Platform
#
# SonarCloud uses this file to understand:
#   - which project to report results under
#   - which files to analyse
#   - which files to ignore
#
# This file is committed to git. It contains NO secrets.
# The SONAR_TOKEN secret lives only in GitHub repository settings.
# =============================================================================

# ── Project identity ──────────────────────────────────────────────────────────
# These values come from your SonarCloud account after you create the project.
# Replace the placeholders below with your actual values.
#
# How to find them:
#   1. Log in at https://sonarcloud.io
#   2. Click "+" → "Analyze new project" → select your GitHub repo
#   3. SonarCloud will show you your projectKey and organization on the setup page
#
sonar.projectKey=amenkhelil_secure-file-sharing-platform
sonar.organization=amenkhelil

# ── Project metadata (displayed in the SonarCloud dashboard) ─────────────────
sonar.projectName=Secure File Sharing Platform
sonar.projectVersion=1.0

# ── Source code location ──────────────────────────────────────────────────────
# "." means the root of the repository.
# SonarCloud will scan all .py files found here.
sonar.sources=.

# ── Language ──────────────────────────────────────────────────────────────────
sonar.language=py
sonar.python.version=3.11

# ── Files to exclude from analysis ───────────────────────────────────────────
# These paths contain no application logic worth analysing:
#   uploads/        — runtime user files, not source code
#   __pycache__/    — compiled Python bytecode
#   .venv/ venv/    — virtual environment dependencies

sonar.exclusions=\
  uploads/**,\
  **/__pycache__/**,\
  .venv/**,\
  venv/**

# ── Encoding ─────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8