name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Secrets required in GitHub → Settings → Secrets and variables → Actions:
#   SONAR_TOKEN        — from sonarcloud.io
#   DOCKERHUB_USERNAME — your Docker Hub username
#   DOCKERHUB_TOKEN    — Docker Hub access token (not your password)
#   KUBECONFIG_DATA    — base64-encoded kubeconfig for your cluster

jobs:

  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint with flake8
        run: |
          flake8 app.py models/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --statistics

      - name: Validate project structure
        run: |
          REQUIRED_FILES=(
            "app.py"
            "requirements.txt"
            "Dockerfile"
            "docker-compose.yml"
            ".gitignore"
            "README.md"
            "sonar-project.properties"
            "models/models.py"
            "models/__init__.py"
            "static/css/style.css"
            "static/js/main.js"
            "templates/base.html"
            "templates/login.html"
            "templates/register.html"
            "templates/dashboard.html"
            "templates/files.html"
            "templates/profile.html"
            "templates/error.html"
            "k8s/namespace.yaml"
            "k8s/secret.yaml"
            "k8s/configmap.yaml"
            "k8s/postgres-volume.yaml"
            "k8s/postgres.yaml"
            "k8s/flask.yaml"
            "k8s/ingress.yaml"
          )

          FAILED=0
          for FILE in "${REQUIRED_FILES[@]}"; do
            if [ -f "$FILE" ]; then
              echo "  ✓ $FILE"
            else
              echo "  ✗ MISSING: $FILE"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "One or more required files are missing."
            exit 1
          fi

      - name: Confirm .env is not committed
        run: |
          if [ -f ".env" ]; then
            echo "ERROR: .env must not be committed — it contains secrets."
            exit 1
          fi
          echo "✓ .env is not in the repository"

      - name: Validate Kubernetes YAML syntax
        run: |
          pip install pyyaml
          python3 -c "
          import yaml, glob, sys
          files = sorted(glob.glob('k8s/*.yaml'))
          failed = 0
          for f in files:
              try:
                  list(yaml.safe_load_all(open(f)))
                  print(f'  ✓ {f}')
              except yaml.YAMLError as e:
                  print(f'  ✗ {f}: {e}')
                  failed = 1
          sys.exit(failed)
          "


  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}


  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: sonarcloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/secure-file-sharing-platform
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Print published tags
        if: github.event_name == 'push'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/  → /'



